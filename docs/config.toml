baseURL = "https://ai.choria.io/"
languageCode = "en-us"
title = "Fisk AI"
theme = "hugo-theme-relearn"

[outputFormats.TXT]
mediaType = "text/plain"
baseName = "llms"
isPlainText = true

[outputs]
home = [ "html", "rss", "print", "markdown", "txt"]
section = [ "html", "rss", "print", "markdown"]
page = [ "html",  "print", "markdown"]

[author]
name = "Choria Project"

[params]
showVisitedLinks = false
disableLanguageSwitchingButton = true
#themeVariant = "ccm"
disableInlineCopyToClipBoard = true
alwaysopen = false
collapsibleMenu = true
externalLinkTargetc= "_self"
disableExplicitIndexURLs = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true


[[params.themeVariant]]
    identifier = 'zen-light'
    name = 'Light'

[[params.themeVariant]]
    identifier = 'ccm'
    name = 'Dark'

